name: CI Pipeline Metrics Experiment

on:
  push:
    branches: [main, experiment/**]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "parallel | sequential | inverted"
        required: false
        default: "parallel"
      pip_cache:
        description: "Habilitar cache pip (true/false)"
        required: false
        default: "true"
      run_slow_tests:
        description: "Executar testes slow (true/false)"
        required: false
        default: "false"

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      execution_mode: ${{ steps.mode.outputs.execution_mode }}
      pip_cache: ${{ steps.mode.outputs.pip_cache }}
      run_slow_tests: ${{ steps.mode.outputs.run_slow_tests }}
      force_test_failure: ${{ steps.mode.outputs.force_test_failure }}
      force_lint_failure: ${{ steps.mode.outputs.force_lint_failure }}
      variation_label: ${{ steps.mode.outputs.variation_label }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolver modo do experimento
        id: mode
        env:
          DISPATCH_MODE: ${{ github.event.inputs.execution_mode }}
          DISPATCH_CACHE: ${{ github.event.inputs.pip_cache }}
          DISPATCH_SLOW: ${{ github.event.inputs.run_slow_tests }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -c "
          import json, os
          from pathlib import Path
          mode = json.loads(Path('ci-mode.json').read_text())
          mode['execution_mode'] = os.environ.get('DISPATCH_MODE', mode['execution_mode'])
          mode['pip_cache'] = os.environ.get('DISPATCH_CACHE', 'true').lower() == 'true'
          mode['run_slow_tests'] = os.environ.get('DISPATCH_SLOW', 'false').lower() == 'true'
          mode['variation_label'] = 'dispatch-' + mode['execution_mode']
          Path('ci-mode.json').write_text(json.dumps(mode, indent=2) + '\n')
          "
          fi
          python scripts/read_ci_mode.py

  lint:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.execution_mode != 'inverted'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache != 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Lint probe
        run: python scripts/lint_probe.py

  test_parallel:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.execution_mode == 'parallel'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache != 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar e testar
        run: |
          mkdir -p reports
          pip install -r requirements-dev.txt
          MARKER='-m "not slow"'
          if [ "${{ needs.setup.outputs.run_slow_tests }}" = "true" ]; then
            MARKER=""
          fi
          eval pytest $MARKER --cov=analyzer --junitxml=reports/junit.xml -v
          python scripts/export_run_metrics.py
        env:
          VARIATION_LABEL: ${{ needs.setup.outputs.variation_label }}
          EXECUTION_MODE: ${{ needs.setup.outputs.execution_mode }}
          PIP_CACHE: ${{ needs.setup.outputs.pip_cache }}
          WORKFLOW_STATUS: success
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-metrics-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn

  test_sequential:
    runs-on: ubuntu-latest
    needs: [setup, lint]
    if: needs.setup.outputs.execution_mode == 'sequential'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache != 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar e testar
        run: |
          mkdir -p reports
          pip install -r requirements-dev.txt
          MARKER='-m "not slow"'
          if [ "${{ needs.setup.outputs.run_slow_tests }}" = "true" ]; then
            MARKER=""
          fi
          eval pytest $MARKER --cov=analyzer --junitxml=reports/junit.xml -v
          python scripts/export_run_metrics.py
        env:
          VARIATION_LABEL: ${{ needs.setup.outputs.variation_label }}
          EXECUTION_MODE: ${{ needs.setup.outputs.execution_mode }}
          PIP_CACHE: ${{ needs.setup.outputs.pip_cache }}
          WORKFLOW_STATUS: success
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-metrics-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn

  test_inverted:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.execution_mode == 'inverted'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache != 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar e testar
        run: |
          mkdir -p reports
          pip install -r requirements-dev.txt
          MARKER='-m "not slow"'
          if [ "${{ needs.setup.outputs.run_slow_tests }}" = "true" ]; then
            MARKER=""
          fi
          eval pytest $MARKER --cov=analyzer --junitxml=reports/junit.xml -v
          python scripts/export_run_metrics.py
        env:
          VARIATION_LABEL: ${{ needs.setup.outputs.variation_label }}
          EXECUTION_MODE: ${{ needs.setup.outputs.execution_mode }}
          PIP_CACHE: ${{ needs.setup.outputs.pip_cache }}
          WORKFLOW_STATUS: success
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-metrics-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn

  lint_inverted:
    runs-on: ubuntu-latest
    needs: [setup, test_inverted]
    if: needs.setup.outputs.execution_mode == 'inverted'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-python@v5
        if: needs.setup.outputs.pip_cache != 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt
      - name: Ruff lint apos testes
        run: ruff check src tests
      - name: Lint probe
        run: python scripts/lint_probe.py

  report:
    runs-on: ubuntu-latest
    needs: [setup, lint, test_parallel, test_sequential, test_inverted, lint_inverted]
    if: always() && !cancelled()
    steps:
      - name: Status consolidado
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test_parallel=${{ needs.test_parallel.result }}"
          echo "test_sequential=${{ needs.test_sequential.result }}"
          echo "test_inverted=${{ needs.test_inverted.result }}"
          echo "lint_inverted=${{ needs.lint_inverted.result }}"
